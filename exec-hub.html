<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Operations Hub</title>
    <link rel="stylesheet" href="css/dgo-tokens.css">
    <link rel="stylesheet" href="css/dgo-reset.css">
    <link rel="stylesheet" href="css/dgo-base.css">
    <link rel="stylesheet" href="css/dgo-layout.css">
    <link rel="stylesheet" href="css/dgo-components.css">
    <link rel="stylesheet" href="css/dgo-cmdk.css">
    <link rel="stylesheet" href="css/exec-hub.css">
</head>
<body>
    <div class="dgo-shell">
        <div class="dgo-split-sidebar">
            <!-- Sidebar Shell Harness -->
            <div id="dgo-sidebar-placeholder"></div>

            <main class="dgo-main">
                <!-- Topbar Utility Harness -->
                <div id="dgo-topbar-placeholder"></div>

                <div class="dgo-content-viewport dgo-stack dgo-stack--4" style="height: 100vh; overflow: hidden; padding-bottom: 0;">
                    <div class="dgo-cluster dgo-cluster--between" style="flex-shrink: 0;">
                        <div class="dgo-stack dgo-stack--1">
                            <h2 class="dgo-h2">Executive Ops Hub</h2>
                            <p class="dgo-body text-muted">Terminal</p>
                        </div>
                        <div class="dgo-cluster">
                            <span style="font-size: 0.75rem; font-family: monospace; color: var(--dgo-color-fg-muted); margin-right: 1rem;" id="userCtx">SYS.ADMIN | exec@nitda.gov.ng</span>
                            <button class="dgo-btn dgo-btn--md dgo-btn--outline" onclick="sync()">
                                <svg style="width: 16px; height: 16px;"><use href="assets/icons/sprite.svg#i-refresh"></use></svg>
                                <span>Sync State</span>
                            </button>
                        </div>
                    </div>

                    <div class="layout" style="flex: 1; min-height: 0; padding-bottom: var(--dgo-s-4);">
                        <aside class="sidebar">
                            <div class="sidebar-header">
                                <input type="text" id="searchInput" class="search-input" placeholder="Query active nodes...">
                            </div>
                            <div class="task-list" id="taskList">
                                <!-- Populated via JS -->
                                 <div style="text-align:center; padding: 2rem; color: var(--muted); font-size: 0.875rem;">Initializing boot sequence...</div>
                            </div>
                        </aside>

                        <main class="main-content" style="padding: 0;">
                            <div class="view-empty" id="viewEmpty">
                                SELECT AN EXECUTION NODE COM_CHANNEL TO INITIALIZE
                            </div>

                            <div class="view-active" id="viewActive">
                                <div class="detail-header">
                                    <h2 class="detail-title" id="dtTitle">--</h2>
                                    <div class="detail-props">
                                        <div class="prop"><span class="prop-label">Node ID</span><span class="prop-value font-mono" id="dtRef">--</span></div>
                                        <div class="prop"><span class="prop-label">State</span><span class="status-badge" id="dtStatus">--</span></div>
                                        <div class="prop"><span class="prop-label">Priority</span><span class="prop-value" id="dtPriority">--</span></div>
                                        <div class="prop"><span class="prop-label">Assignee</span><span class="prop-value" id="dtAssignee">--</span></div>
                                        <div class="prop"><span class="prop-label">Timestamp</span><span class="prop-value text-sm" id="dtDate">--</span></div>
                                    </div>
                                </div>

                                <div class="detail-body">
                                    <section>
                                        <h3 class="section-title">Context Payload</h3>
                                        <div class="desc-box" id="dtDesc"></div>
                                    </section>
                                </div>

                                <div class="action-form">
                                    <div class="form-row">
                                        <div class="input-group">
                                            <label>Execution Directive (Minuting)</label>
                                            <textarea id="actionNotes" placeholder="Enter directive or clearance note..."></textarea>
                                        </div>
                                        <div class="input-group" style="max-width: 300px;">
                                            <label>Routing Vector</label>
                                            <select id="actionRoute">
                                                <option value="">-- Target Node --</option>
                                            </select>
                                            <div style="display:flex; gap:0.5rem; margin-top: auto;">
                                                <button class="btn btn-primary" style="flex:1;" onclick="submitAction('Approve')">APPROVE</button>
                                                <button class="btn" style="flex:1;" onclick="submitAction('Delegate')">ROUTE</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            </main>
        </div>
    </div>

    

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/sanitizer.js"></script>
    <script type="module" src="js/identity.js"></script>
    <script type="module" src="js/state.js"></script>
    <script type="module" src="js/lookups.js"></script>
    <script type="module" src="js/a11y.js"></script>
    <script type="module" src="js/telemetry.js"></script>
    <script type="module" src="js/chrome.js"></script>
    <script type="module" src="js/exec-hub.js"></script>
    <script type="module" src="js/pages/exec-hub.js"></script>
</body>
</html>
