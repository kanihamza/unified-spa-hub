name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  compliance:
    name: Compliance lint (BRD §13 controls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No dependencies required — pure Node static checks.
      - run: node test/compliance-lint.mjs

  smoke:
    name: Real-browser smoke (Playwright + Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (test-only; not a runtime dependency)
        run: |
          npm install --no-save playwright@^1.61.0
          npx playwright install --with-deps chromium
      - name: Smoke test
        run: node test/smoke.mjs
