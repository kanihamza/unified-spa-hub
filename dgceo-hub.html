<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.environment.api.powerplatform.com https://*.logic.azure.com; object-src 'none'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITDA DGCEO Decision Hub</title>
    <link rel="stylesheet" href="css/dgo-tokens.css">
    <link rel="stylesheet" href="css/dgo-reset.css">
    <link rel="stylesheet" href="css/dgo-base.css">
    <link rel="stylesheet" href="css/dgo-layout.css">
    <link rel="stylesheet" href="css/dgo-components.css">
    <link rel="stylesheet" href="css/dgo-cmdk.css">
    <link rel="stylesheet" href="css/dgceo-hub.css">
</head>
<body>
    <div class="dgo-shell">
        <div class="dgo-split-sidebar">
            <!-- Sidebar Shell Harness -->
            <div id="dgo-sidebar-placeholder"></div>

            <main class="dgo-main">
                <!-- Topbar Utility Harness -->
                <div id="dgo-topbar-placeholder"></div>

                <div class="dgo-content-viewport dgo-stack dgo-stack--4" style="height: 100vh; overflow: hidden; padding-bottom: 0;">
                    <div class="dgo-cluster dgo-cluster--between" style="flex-shrink: 0;">
                        <div class="dgo-stack dgo-stack--1">
                            <h2 class="dgo-h2">Decision Hub</h2>
                            <p class="dgo-body text-muted">Office of the Director General</p>
                        </div>
                        <div class="dgo-cluster">
                            <button class="dgo-btn dgo-btn--md dgo-btn--outline" data-act="syncData">
                                <svg style="width: 16px; height: 16px;"><use href="assets/icons/sprite.svg#i-refresh"></use></svg>
                                <span>Sync Feed</span>
                            </button>
                        </div>
                    </div>

                    <div class="main-grid" style="flex: 1; min-height: 0; padding-bottom: var(--dgo-s-4);">
                        <aside class="feed-panel">
                            <div class="feed-header">
                                <h2>Pending Files</h2>
                                <div class="feed-controls">
                                    <select id="filterStatus" data-act-change="filterFeed">
                                        <option value="Pending">Needs Action</option>
                                        <option value="All">All Files</option>
                                        <option value="Completed">Treated</option>
                                    </select>
                                </div>
                            </div>
                            <div class="feed-list" id="feedList">
                                <div style="padding: 20px; text-align: center; color: #999; font-size: 12px; font-weight: bold; text-transform: uppercase;">Awaiting Sync...</div>
                            </div>
                        </aside>

                        <main class="detail-panel">
                            <div class="detail-content" id="detailContent">
                                <div class="empty-state">Select a file from the feed to view execution context.</div>
                            </div>
                            
                            <div class="action-bar" id="actionBar" style="display: none;">
                                <div class="action-box" style="flex: 2;">
                                    <label>Executive Directive / Minutes</label>
                                    <textarea id="decisionNotes" placeholder="Enter instructions, remarks, or approval conditions..."></textarea>
                                </div>
                                <div class="action-box" style="flex: 1; border-left: 1px solid #eee; padding-left: 15px;">
                                    <label>Route & Delegate To</label>
                                    <select id="delegateOfficer">
                                        <option value="">Loading routing table...</option>
                                    </select>
                                    <div style="display: flex; gap: 10px;">
                                        <button class="btn-primary" data-act="submitDecision" data-arg="Approve">Approve / Treat</button>
                                        <button class="btn-secondary" data-act="submitDecision" data-arg="Delegate">Min/Delegate</button>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            </main>
        </div>
    </div>

    

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dgceo-hub.js"></script>
    <script type="module" src="js/pages/dgceo-hub.js"></script>
</body>
</html>
