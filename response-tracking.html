<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Tracking - NITDA</title>
    <link rel="stylesheet" href="css/dgo-tokens.css">
    <link rel="stylesheet" href="css/dgo-reset.css">
    <link rel="stylesheet" href="css/dgo-base.css">
    <link rel="stylesheet" href="css/dgo-layout.css">
    <link rel="stylesheet" href="css/dgo-components.css">
    <link rel="stylesheet" href="css/dgo-cmdk.css">
    <link rel="stylesheet" href="css/response-tracking.css">
</head>
<body>
    <div class="dgo-shell">
        <div class="dgo-split-sidebar">
            <!-- Sidebar Shell Harness -->
            <div id="dgo-sidebar-placeholder"></div>

            <main class="dgo-main">
                <!-- Topbar Utility Harness -->
                <div id="dgo-topbar-placeholder"></div>

                <div class="dgo-content-viewport dgo-stack dgo-stack--4">
                    <div class="dgo-cluster dgo-cluster--between">
                        <div class="dgo-stack dgo-stack--1">
                            <h2 class="dgo-h2">Response Tracking & Matrix</h2>
                            <p class="dgo-body text-muted">Tracking details ledger</p>
                        </div>
                        <div class="dgo-cluster">
                            <button class="dgo-btn dgo-btn--md dgo-btn--outline" onclick="syncData()">
                                <svg style="width: 16px; height: 16px;"><use href="assets/icons/sprite.svg#i-refresh"></use></svg>
                                <span>Sync Live Data</span>
                            </button>
                        </div>
                    </div>

                    <div class="container" style="max-width: 100%;">
                        <div class="filter-bar">
                            <div class="filter-group">
                                <label for="filterAckStatus">Status</label>
                                <select id="filterAckStatus">
                                    <option value="">All Statuses</option>
                                    <option value="Completed">Completed / Treated</option>
                                    <option value="Pending">Pending / Assigned</option>
                                    <option value="Not started">Not Started</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label for="filterCategory">Category</label>
                                <select id="filterCategory">
                                    <option value="">All Categories</option>
                                </select>
                            </div>
                            <div class="filter-group" style="flex-grow: 1;">
                                <label for="filterSearch">Global Search</label>
                                <input type="text" id="filterSearch" placeholder="Search by title, ID, or assignee...">
                            </div>
                            <button class="btn-search" onclick="applyFilters()">Filter Data</button>
                        </div>

                        <div class="response-table">
                            <div class="table-wrapper">
                                <table id="responseTable">
                                    <thead>
                                        <tr>
                                            <th>Reference ID</th>
                                            <th style="width: 35%;">Activity / Title</th>
                                            <th>Assigned To</th>
                                            <th>Category</th>
                                            <th>Due Date</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tableBody">
                                        <tr>
                                            <td colspan="7" class="loading">Click "Sync Live Data" to fetch Enterprise records...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal" id="ackModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Acknowledge Task Receipt</h2>
                <button class="modal-close" onclick="closeAckModal()">&times;</button>
            </div>
            <form id="ackForm" onsubmit="handleAckSubmit(event)">
                <div class="form-group">
                    <label for="ackEmail">Your Email</label>
                    <input type="email" id="ackEmail" required>
                </div>
                <div class="form-group">
                    <label for="ackNotes">Acknowledgment Notes</label>
                    <textarea id="ackNotes" placeholder="Add any notes... "></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-search" style="flex: 1;">Acknowledge</button>
                    <button type="button" class="back-btn" style="flex: 1;" onclick="closeAckModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="detailsModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 class="modal-title">Matrix View: Task Lineage</h2>
                <button class="modal-close" onclick="closeDetailsModal()">&times;</button>
            </div>
            <div id="detailsContent"></div>
        </div>
    </div>

    <div class="notification" id="notification"></div>
    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/sanitizer.js"></script>
    <script type="module" src="/js/identity.js"></script>
    <script type="module" src="/js/state.js"></script>
    <script type="module" src="/js/lookups.js"></script>
    <script type="module" src="/js/a11y.js"></script>
    <script type="module" src="/js/telemetry.js"></script>
    <script type="module" src="/js/chrome.js"></script>
    <script type="module" src="/js/response-tracking.js"></script>
    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Chrome) window.Chrome.bootstrap('response-track');
        });
    </script>
</body>
</html>
